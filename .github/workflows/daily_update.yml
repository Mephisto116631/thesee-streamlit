# .github/workflows/daily_update.yml
name: Mise à jour des données Yahoo Finance

on:
  schedule:
    # S'exécute du mardi au samedi à 01h00 UTC (pour récupérer la clôture de la veille)
    - cron: '0 1 * * 2-6'
  workflow_dispatch: # Permet de lancer le script manuellement depuis GitHub si besoin

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: |
          pip install yfinance pandas supabase

      - name: Exécuter le script de mise à jour
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/update_market_data.py
        
